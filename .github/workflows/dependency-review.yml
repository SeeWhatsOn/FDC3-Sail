# Flags new vulnerable dependencies introduced on the PR diff (GitHub Advisory DB).
# See https://github.com/actions/dependency-review-action
name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - "**/package.json"
      - "**/package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - ".github/workflows/dependency-review.yml"

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 #4.9.0
